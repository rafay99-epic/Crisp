name: CI

# Desktop-app CI **and** release, in one pipeline so the build users receive is
# the exact one that passed every check. Test + lint are the gate: on `main` the
# release builds + publishes only after both pass; on PRs the DMG builds +
# uploads as an artifact instead. The release-config compile happens inside those
# build steps (build.sh), so there's no separate build job recompiling the same
# thing on its own runner. The website has its own workflow (website.yml); each
# app triggers only on its own paths.
#
# Why one workflow and not a separate Release workflow: two independent workflows
# each run their own `swift test`, and a flaky test can pass in one while failing
# the other — which once shipped a release while CI was red. Here there is a
# single test run that the publish step depends on, so a red test can never reach
# users' auto-updater.
on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      # A Windows-only promotion still cuts the stable release (with the rebuilt DMG)
      # that windows.yml attaches Crisp-Setup.exe to — one release, both assets.
      - "apps/desktop-win/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/ci.yml"

# Read-only by default — only the release job below is granted contents: write.
# Least privilege for the GITHUB_TOKEN; jobs that need more opt in explicitly.
permissions:
  contents: read

# PRs cancel superseded runs; main never cancels, so pushes serialize and two
# releases can't race to publish the same version.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test (swift test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test

  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  # The cleaning engine is stdlib-only Python, so its unit tests need no deps and
  # no ffmpeg/whisper — they pin the pure cut-planning / filler / encoder logic.
  engine-test:
    name: Engine tests (Python)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Run engine unit tests
        run: python3 -m unittest discover -s Resources/engine/tests -t Resources/engine

  # PR only: build + package the DMG (this IS the release-config build check —
  # build.sh does a universal `swift build -c release`, so a separate build job
  # would just compile the same thing again on another runner) and upload it as
  # an artifact so a reviewer can install the change. No publish.
  package:
    name: Build & package DMG
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    needs: [test, lint, engine-test]
    steps:
      - uses: actions/checkout@v7
      - name: Build app and installer
        env:
          CRISP_POLAR_ORG_ID: ${{ secrets.CRISP_POLAR_ORG_ID }}
          CRISP_POLAR_CHECKOUT_URL: ${{ secrets.CRISP_POLAR_CHECKOUT_URL }}
          CRISP_POLAR_PORTAL_URL: ${{ secrets.CRISP_POLAR_PORTAL_URL }}
          CRISP_POLAR_LOOKUP_URL: ${{ secrets.CRISP_POLAR_LOOKUP_URL }}
        run: |
          ./build.sh
          ./make-dmg.sh
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Crisp-dmg
          path: apps/desktop/build/Crisp.dmg

  # main only: build + publish the GitHub Release (version = commit count).
  # `needs: [test, lint, engine-test]` gates it, and build.sh below is the release-config
  # build — if tests or lint fail, this job is skipped and nothing is built or
  # published, so users never auto-update onto a build that didn't pass. A red
  # build.sh here fails the job before `gh release create` runs, so a broken
  # compile can't publish either.
  release:
    name: Build and publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    needs: [test, lint, engine-test]
    # `models: read` lets highlights.sh call GitHub Models for the friendly notes.
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version is the commit count

      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Build app and installer
        env:
          CRISP_POLAR_ORG_ID: ${{ secrets.CRISP_POLAR_ORG_ID }}
          CRISP_POLAR_CHECKOUT_URL: ${{ secrets.CRISP_POLAR_CHECKOUT_URL }}
          CRISP_POLAR_PORTAL_URL: ${{ secrets.CRISP_POLAR_PORTAL_URL }}
          CRISP_POLAR_LOOKUP_URL: ${{ secrets.CRISP_POLAR_LOOKUP_URL }}
        run: |
          export CRISP_VERSION="$VERSION"
          ./build.sh
          ./make-dmg.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Stable notes = the PRs on `nightly` between the last promotion and this
          # one. main itself carries only "Promote" squash commits, so GitHub's own
          # --generate-notes finds nothing (hence the old empty release bodies).
          # promote.sh stamps each promotion with the nightly SHA it shipped; diff
          # this commit's trailer against the previous promotion's.
          git fetch origin nightly --quiet || true
          CUR=$(git log -1 --format='%(trailers:key=Promoted-nightly,valueonly)' | head -1)
          PREV=$(git log -1 --format='%(trailers:key=Promoted-nightly,valueonly)' HEAD~1 2>/dev/null | head -1)
          NOTES_FILE="$(mktemp)"
          if [ -n "$CUR" ] && [ -n "$PREV" ] \
             && git rev-parse --verify --quiet "${CUR}^{commit}" >/dev/null \
             && git rev-parse --verify --quiet "${PREV}^{commit}" >/dev/null; then
            {
              # Friendly, user-facing highlights via GitHub Models (best-effort),
              # then the full grouped changelog beneath.
              bash "$GITHUB_WORKSPACE/.github/scripts/highlights.sh" "${PREV}..${CUR}" || true
              echo "## What's changed"
              echo
              bash "$GITHUB_WORKSPACE/.github/scripts/gen-changelog.sh" "${PREV}..${CUR}" || true
            } > "$NOTES_FILE"
          fi
          if [ -s "$NOTES_FILE" ]; then
            gh release create "v$VERSION" build/Crisp.dmg \
              --title "Crisp $VERSION" --notes-file "$NOTES_FILE"
          else
            # First release, missing trailers, or empty range — fall back to GitHub's
            # auto notes rather than shipping no notes at all.
            gh release create "v$VERSION" build/Crisp.dmg \
              --title "Crisp $VERSION" --generate-notes
          fi

      # Keep the Homebrew cask in sync automatically — the stable `crisp` cask is
      # version-pinned, so this pushes the new version + DMG sha256 to the tap so
      # nobody hand-edits it. Needs a TAP_TOKEN secret (fine-grained PAT with
      # Contents: Read & Write on rafay99-epic/homebrew-apps); skips with a
      # warning if it's absent so a missing secret never fails the release.
      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          CASK=crisp bash "$GITHUB_WORKSPACE/.github/scripts/bump-cask.sh" "$PWD/build/Crisp.dmg"
# Dependency checking is handled by Dependabot (.github/dependabot.yml) and
# Dependabot security alerts — dependency-review-action needs GitHub Advanced
# Security, which isn't available on private personal repos.
