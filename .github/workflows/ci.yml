name: CI

# Desktop-app CI **and** release, in one pipeline so the build users receive is
# the exact one that passed every check. Test + lint are the gate: on `main` the
# release builds + publishes only after both pass; on PRs the DMG builds +
# uploads as an artifact instead. The release-config compile happens inside those
# build steps (build.sh), so there's no separate build job recompiling the same
# thing on its own runner. The website has its own workflow (website.yml); each
# app triggers only on its own paths.
#
# Why one workflow and not a separate Release workflow: two independent workflows
# each run their own `swift test`, and a flaky test can pass in one while failing
# the other — which once shipped a release while CI was red. Here there is a
# single test run that the publish step depends on, so a red test can never reach
# users' auto-updater.
on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/ci.yml"

# PRs cancel superseded runs; main never cancels, so pushes serialize and two
# releases can't race to publish the same version.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test (swift test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test

  lint:
    name: Quality (SwiftLint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  # PR only: build + package the DMG (this IS the release-config build check —
  # build.sh does a universal `swift build -c release`, so a separate build job
  # would just compile the same thing again on another runner) and upload it as
  # an artifact so a reviewer can install the change. No publish.
  package:
    name: Build & package DMG
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v6
      - name: Build app and installer
        run: |
          ./build.sh
          ./make-dmg.sh
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Crisp-dmg
          path: apps/desktop/build/Crisp.dmg

  # main only: build + publish the GitHub Release (version = commit count).
  # `needs: [test, lint]` gates it, and build.sh below is the release-config
  # build — if tests or lint fail, this job is skipped and nothing is built or
  # published, so users never auto-update onto a build that didn't pass. A red
  # build.sh here fails the job before `gh release create` runs, so a broken
  # compile can't publish either.
  release:
    name: Build and publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    needs: [test, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history — the version is the commit count

      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Build app and installer
        run: |
          export CRISP_VERSION="$VERSION"
          ./build.sh
          ./make-dmg.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" build/Crisp.dmg \
            --title "Crisp $VERSION" \
            --generate-notes

      # Keep the Homebrew cask in sync automatically — the stable `crisp` cask is
      # version-pinned, so this pushes the new version + DMG sha256 to the tap so
      # nobody hand-edits it. Needs a TAP_TOKEN secret (fine-grained PAT with
      # Contents: Read & Write on rafay99-epic/homebrew-apps); skips with a
      # warning if it's absent so a missing secret never fails the release.
      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          bash "$GITHUB_WORKSPACE/.github/scripts/bump-cask.sh" "$PWD/build/Crisp.dmg"
# Dependency checking is handled by Dependabot (.github/dependabot.yml) and
# Dependabot security alerts — dependency-review-action needs GitHub Advanced
# Security, which isn't available on private personal repos.
