# Scarlet Speedster — Automated PR Review Trigger
#
# This workflow fires when a PR is opened, updated, or marked ready for review.
# It sends a webhook to the Hermes agent server, which triggers an automated
# code review by Scarlet Speedster.
#
# SETUP INSTRUCTIONS:
# 1. Add the following repository secrets (Settings → Secrets and Variables → Actions):
#    - HERMES_WEBHOOK_URL  — The webhook receiver URL (e.g., http://YOUR_SERVER_IP:9876)
#    - HERMES_WEBHOOK_SECRET — Shared secret for signature validation
# 2. Copy this file to: .github/workflows/scarlet-review.yml
# 3. That's it! Every PR will now get an automated review.
#
# NOTE: The webhook trigger uses continue-on-error so that if the Hermes server
# is offline or the port is blocked (e.g., Oracle Cloud VCN), the workflow
# still passes and does not block PR merges. The review will simply be skipped.

name: Scarlet Speedster PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Only the newest trigger per PR runs; rapid pushes cancel stale in-flight ones.
concurrency:
  group: scarlet-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trigger-review:
    runs-on: ubuntu-latest
    steps:
      - name: Send review trigger to Hermes
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "HERMES_WEBHOOK_URL secret not set — skipping review trigger"
            exit 0
          fi

          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "HERMES_WEBHOOK_SECRET secret not set — skipping review trigger"
            exit 0
          fi

          # Sign the exact event bytes and send those same bytes, so the HMAC the
          # Hermes server recomputes over the request body matches. xxd -p -c 256
          # keeps the 64-char digest on one line (default wraps → a broken header).
          SIGNATURE="sha256=$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary "$GITHUB_EVENT_PATH" | xxd -p -c 256)"

          echo "Triggering review for PR #${PR_NUMBER} in $GITHUB_REPOSITORY"

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 --connect-timeout 5 -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            --data-binary @"$GITHUB_EVENT_PATH" \
            "$WEBHOOK_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $HTTP_CODE — $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Review triggered successfully"
          else
            echo "⚠️ Webhook returned $HTTP_CODE — review may not have been triggered (server may be offline or port blocked)"
          fi
