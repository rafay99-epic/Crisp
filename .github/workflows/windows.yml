name: Windows

# CI + release feed for the Windows port (apps/desktop-win, Avalonia/.NET). The
# counterpart of the macOS pipeline (ci.yml / nightly.yml): detect a change to the
# Windows app or the shared engine → build → headless self-tests + the shared
# engine's OS-aware Python tests (run here on real Windows) → package a single
# self-contained installer. On a push to `nightly` it also publishes that one
# installer to a rolling Windows pre-release, in parallel with the macOS DMG.
# Pull requests and dev builds run everything up to (and including) packaging so a
# reviewer can smoke-test the installer — but they never publish a release.
#
# The engine lives in apps/desktop/Resources/engine and is shared, so a change
# there triggers this too.
on:
  push:
    branches: [main, nightly]
    paths:
      - "apps/desktop-win/**"
      - "apps/desktop/Resources/engine/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "apps/desktop-win/**"
      - "apps/desktop/Resources/engine/**"
      - ".github/workflows/windows.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & test (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop-win
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Restore & build
        run: dotnet build Crisp.sln -c Release

      # Headless self-tests (Program.cs --*-test modes) — the same checks run on the
      # dev's Mac. Each returns non-zero on failure, so a regression fails the job.
      - name: App self-tests
        run: |
          dotnet run --project Crisp.csproj -c Release --no-build -- --preset-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --channel-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --editor-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --review-test
          New-Item -ItemType File -Path sample.mp4 -Force | Out-Null
          Set-Content -Path sample.mp4 -Value ("x" * 4096)
          dotnet run --project Crisp.csproj -c Release --no-build -- --watch-test sample.mp4

      # The shared engine's OS-aware code (encoder selection + process-teardown guard)
      # validated on real Windows — these are fully platform-mocked, so they assert the
      # win32 branch the macOS runner never hits. The rest of the engine suite (262
      # tests) runs comprehensively on macOS CI (ci.yml); many of those assert macOS
      # encoder names / POSIX path strings, so they're macOS-only by design.
      - name: Engine OS-aware encoder tests (Python, on Windows)
        working-directory: apps/desktop/Resources/engine
        run: python -m unittest tests.test_encode_platform -v

  # Vendors the engine binaries (ffmpeg/whisper/python, pinned + hash-checked) and
  # produces the ONE file a user runs: Crisp-Setup.exe (Crisp-Nightly-Setup.exe on
  # the nightly channel) — a single self-contained installer, uploaded as the run's
  # only artifact. On a nightly push the identity (channel + version + build number)
  # is baked into the exe so the installed app knows it's Nightly. The vendored
  # binaries are cached on the vendor-script hash, so the heavy ffmpeg download +
  # whisper.cpp build only run when the pins change.
  package:
    name: Package installer (win-x64)
    runs-on: windows-latest
    needs: build
    defaults:
      run:
        working-directory: apps/desktop-win
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version is the commit count
          persist-credentials: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Nightly on a push to `nightly`, else a plain stable verification build.
      - name: Compute identity
        run: |
          $channel = if ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF -eq 'refs/heads/nightly') { 'nightly' } else { 'stable' }
          $asset   = if ($channel -eq 'nightly') { 'Crisp-Nightly-Setup.exe' } else { 'Crisp-Setup.exe' }
          $version = "0.$(git rev-list --count HEAD)"
          "CHANNEL=$channel"             | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "VERSION=$version"             | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "BUILD=$env:GITHUB_RUN_NUMBER" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "ASSET=$asset"                 | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Cache vendored binaries
        uses: actions/cache@v4
        with:
          path: apps/desktop-win/.vendor/bin
          key: vendor-win-${{ hashFiles('apps/desktop-win/Scripts/vendor-win.ps1') }}

      - name: Vendor engine binaries (ffmpeg/whisper/python, pinned)
        run: pwsh Scripts/vendor-win.ps1

      - name: Publish + bundle the engine and its binaries
        run: |
          # Bake channel/version/build into the assembly so the installed app knows
          # its identity without an env var (env still overrides). See BuildInfo.cs.
          dotnet publish Crisp.csproj -c Release -r win-x64 --self-contained `
            -p:CrispChannel=$env:CHANNEL -p:CrispVersion=$env:VERSION -p:CrispBuildNumber=$env:BUILD `
            -o publish
          Copy-Item -Recurse -Force ../desktop/Resources/engine publish/engine
          New-Item -ItemType Directory -Force -Path publish/engine/bin | Out-Null
          Copy-Item -Recurse -Force .vendor/bin/* publish/engine/bin/

      - name: Build installer (Inno Setup)
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc "/DSourceDir=$PWD\publish" "/DAppVersion=$env:VERSION" Scripts\crisp.iss
          Move-Item Scripts\Crisp-Setup.exe "Scripts\$env:ASSET" -Force

      - name: Upload installer (the single release file)
        uses: actions/upload-artifact@v7
        with:
          name: Crisp-Windows-Installer
          path: apps/desktop-win/Scripts/*Setup.exe

  # The Windows nightly feed. Only a push to `nightly` on the canonical repo
  # publishes — a fork or a PR runs build+package to verify, then stops here.
  # Refreshes a single rolling `nightly-win` pre-release carrying the one
  # installer, mirroring the macOS `nightly` release; the two feeds are separate
  # rolling tags so neither clobbers the other's asset. The updater orders builds
  # by the "build <n>" in the title (Updater.ParseBuildNumber), so it MUST be there.
  publish:
    name: Publish Windows Nightly pre-release
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && github.ref == 'refs/heads/nightly' && github.repository == 'rafay99-epic/Crisp'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v7
        with:
          name: Crisp-Windows-Installer
          path: dist

      - name: Refresh the rolling "nightly-win" pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD: ${{ github.run_number }}
        run: |
          VERSION="0.$(git rev-list --count HEAD)"
          SHA="$(git rev-parse --short HEAD)"
          NOTES_FILE="$(mktemp)"
          {
            echo "Windows nightly build from the \`nightly\` branch @ \`$SHA\` (build $BUILD, version $VERSION-nightly)."
            echo
            echo "**Install:** download \`Crisp-Nightly-Setup.exe\` below and run it. Installs as **Crisp Nightly** — a separate app, settings, and data dir — so it sits next to a Stable install without touching it. Nightly auto-updates from this feed."
            echo
            echo "⚠️ Unsigned pre-release for testing. SmartScreen may warn on first run (More info → Run anyway)."
          } > "$NOTES_FILE"
          # A single fixed `nightly-win` tag that always holds the newest Windows
          # nightly installer — the updater has no /latest/ URL for pre-releases, so
          # it needs this stable pointer. Title MUST contain "build <n>".
          gh release delete nightly-win --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly-win dist/*Setup.exe \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Crisp Nightly (Windows) · build $BUILD" \
            --notes-file "$NOTES_FILE"
