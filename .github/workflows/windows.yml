name: Windows

# CI + release feed for the Windows port (apps/desktop-win, Avalonia/.NET). The
# counterpart of the macOS pipeline (ci.yml / nightly.yml): build → headless
# self-tests + the shared engine's OS-aware Python tests (run here on real Windows)
# → package a single self-contained installer → attach that one installer to the
# release the macOS workflow publishes (stable v0.<count> on main, or the rolling
# `nightly` pre-release). So one release carries BOTH the DMG and the .exe.
#
# Triggers on ANY desktop change (macOS or Windows) so the shared release always
# holds both assets built from the *same* commit — the release's "build N" / version
# is shared, so a stale asset would misreport updates. The macOS workflow owns the
# release (title, notes, DMG); this one only adds Crisp-Setup.exe. Pull requests and
# dev builds run everything up to (and including) packaging so a reviewer can
# smoke-test the installer — but they never publish.
on:
  push:
    branches: [main, nightly]
    paths:
      - "apps/desktop/**"
      - "apps/desktop-win/**"
      - "packages/engine/**"
      - ".github/workflows/windows.yml"
      # Docs-only changes never need a Windows build — a Markdown change under any
      # watched folder (e.g. moving NOTES.md/PARITY.md) must NOT trigger this.
      # `!` negates (last-match-wins): a .md-only diff is skipped, while any real
      # code change still fires.
      - "!**/*.md"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/desktop-win/**"
      - "packages/engine/**"
      - ".github/workflows/windows.yml"
      # Docs-only changes never need a Windows build — a Markdown change under any
      # watched folder (e.g. moving NOTES.md/PARITY.md) must NOT trigger this.
      # `!` negates (last-match-wins): a .md-only diff is skipped, while any real
      # code change still fires.
      - "!**/*.md"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & test (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop-win
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Restore & build
        run: dotnet build Crisp.sln -c Release

      # Headless self-tests (Program.cs --*-test modes) — the same checks run on the
      # dev's Mac. Each returns non-zero on failure, so a regression fails the job.
      - name: App self-tests
        run: |
          dotnet run --project Crisp.csproj -c Release --no-build -- --preset-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --channel-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --editor-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --review-test
          dotnet run --project Crisp.csproj -c Release --no-build -- --onboarding-test
          New-Item -ItemType File -Path sample.mp4 -Force | Out-Null
          Set-Content -Path sample.mp4 -Value ("x" * 4096)
          dotnet run --project Crisp.csproj -c Release --no-build -- --watch-test sample.mp4

      # The shared engine's OS-aware code (encoder selection + process-teardown guard)
      # validated on real Windows — these are fully platform-mocked, so they assert the
      # win32 branch the macOS runner never hits. The rest of the engine suite (262
      # tests) runs comprehensively on macOS CI (ci.yml); many of those assert macOS
      # encoder names / POSIX path strings, so they're macOS-only by design.
      - name: Engine OS-aware encoder tests (Python, on Windows)
        working-directory: packages/engine
        run: python -m unittest tests.test_encode_platform -v

  # Vendors the engine binaries (ffmpeg/whisper/python, pinned + hash-checked) and
  # produces the ONE file a user runs: Crisp-Setup.exe (Crisp-Nightly-Setup.exe on
  # the nightly channel) — a single self-contained installer, uploaded as the run's
  # only artifact. Channel/version/build are baked into the exe so the installed app
  # knows its identity (env vars don't reach an installed app). The vendored binaries
  # are cached on the vendor-script hash, so the heavy ffmpeg download + whisper.cpp
  # build only run when the pins change.
  package:
    name: Package installer (win-x64)
    runs-on: windows-latest
    needs: build
    defaults:
      run:
        working-directory: apps/desktop-win
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version + nightly build number are commit counts
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # nightly on a push to `nightly`, else the stable channel (main push / PR /
      # dispatch — only main actually publishes). VERSION + the nightly build number
      # are both the commit count, computed identically to the macOS build so the one
      # shared release's version / "build N" agree across platforms.
      - name: Compute identity
        run: |
          $channel = if ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF -eq 'refs/heads/nightly') { 'nightly' } else { 'stable' }
          $asset   = if ($channel -eq 'nightly') { 'Crisp-Nightly-Setup.exe' } else { 'Crisp-Setup.exe' }
          $count   = "$(git rev-list --count HEAD)"
          "CHANNEL=$channel"     | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "VERSION=0.$count"     | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "BUILD=$count"         | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "ASSET=$asset"         | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Cache vendored binaries
        uses: actions/cache@v6
        with:
          path: apps/desktop-win/.vendor/bin
          key: vendor-win-${{ hashFiles('apps/desktop-win/Scripts/vendor-win.ps1') }}

      - name: Vendor engine binaries (ffmpeg/whisper/python, pinned)
        run: pwsh Scripts/vendor-win.ps1

      - name: Publish + bundle the engine and its binaries
        run: |
          # Bake channel/version/build into the assembly so the installed app knows
          # its identity without an env var (env still overrides). See BuildInfo.cs.
          dotnet publish Crisp.csproj -c Release -r win-x64 --self-contained `
            -p:CrispChannel=$env:CHANNEL -p:CrispVersion=$env:VERSION -p:CrispBuildNumber=$env:BUILD `
            -o publish
          Copy-Item -Recurse -Force ../../packages/engine publish/engine
          New-Item -ItemType Directory -Force -Path publish/engine/bin | Out-Null
          Copy-Item -Recurse -Force .vendor/bin/* publish/engine/bin/

      - name: Build installer (Inno Setup)
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc "/DSourceDir=$PWD\publish" "/DAppVersion=$env:VERSION" Scripts\crisp.iss
          Move-Item Scripts\Crisp-Setup.exe "Scripts\$env:ASSET" -Force

      - name: Upload installer (the single release file)
        uses: actions/upload-artifact@v7
        with:
          name: Crisp-Windows-Installer
          path: apps/desktop-win/Scripts/*Setup.exe

  # Attaches the one Windows installer to the release the macOS workflow publishes —
  # so a single release (stable v0.<count> on main, or the rolling `nightly`
  # pre-release) carries both the DMG and the .exe. Only a push to a release branch
  # on the canonical repo publishes; PRs / dev / forks stop after packaging.
  publish:
    name: Attach installer to the release
    runs-on: ubuntu-latest
    needs: package
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/nightly' || github.ref == 'refs/heads/main')
      && github.repository == 'rafay99-epic/Crisp'
    # Elevated on purpose: the step below runs `gh release upload` to attach the
    # installer asset to the macOS-owned release, which needs contents: write. The
    # rest of the workflow (build/package) stays on the read-only default above.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: Crisp-Windows-Installer
          path: dist

      - name: Attach the installer to the macOS-owned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" = "refs/heads/nightly" ]; then
            TAG=nightly            # rolling pre-release, always exists after the first build
          else
            TAG="v0.$(git rev-list --count HEAD)"   # fresh stable tag, created by ci.yml this run
          fi
          EXE="$(ls dist/*Setup.exe)"
          # The macOS workflow (nightly.yml / ci.yml) creates and owns the release
          # (title, notes, DMG); we only add the one Windows installer — a different
          # asset name, so --clobber never touches the DMG. Wait for that release: on
          # a fresh stable tag the macOS build is creating it in parallel. If it never
          # appears (a red macOS build → no release), warn rather than fail — the
          # installer is still downloadable from this run's artifact.
          for i in $(seq 1 60); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" "$EXE" --clobber
              echo "Attached $(basename "$EXE") to release $TAG."
              exit 0
            fi
            echo "Release $TAG not published yet — waiting for the macOS build ($i/60)…"
            sleep 30
          done
          echo "::warning::Release $TAG never appeared (the macOS build may have failed); the installer is available as this run's artifact."
