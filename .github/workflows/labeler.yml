name: Labeler

# Auto-applies area:* labels to PRs based on the paths they touch. The label
# rules live in .github/labeler.yml and mirror the path filters in the other
# CI workflows, so the label tells you at a glance which pipelines a PR is
# exercising (area:engine → ci.yml/nightly.yml/windows.yml, area:desktop →
# ci.yml/nightly.yml, area:platform → windows.yml, area:website → website.yml,
# area:licensing → the license-api/Polar code, area:ci → all of the above,
# area:docs → none).
#
# Uses `pull_request_target` so the action has `pull-requests: write` even on
# PRs from forks. The checkout step is intentionally omitted — the action
# reads the PR's changed files from the GitHub API and never executes PR code,
# so this is safe (the usual pull_request_target hazard is checking out and
# running untrusted PR code with elevated permissions).
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Read-only by default; only the label job gets the write scope it needs.
permissions:
  contents: read

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply area labels
    runs-on: ubuntu-latest
    # Don't try to label PRs opened against forks of this repo.
    if: github.repository == 'rafay99-epic/Crisp'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
