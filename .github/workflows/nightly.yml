name: Nightly

# The Nightly channel's feed. Every push to the `nightly` integration branch
# builds the Nightly app and refreshes a single rolling `nightly` GitHub
# *pre-release* carrying Crisp-Nightly.dmg — the feed the Nightly app's updater
# and the Homebrew cask (rafay99-epic/apps/crisp-nightly) track. Stable (main →
# ci.yml's release job) is untouched; Dev publishes nothing.
#
# Gated by tests: a broken push publishes nothing. Publishing is guarded to the
# canonical repo so a fork's `nightly` branch can't try (and fail) to publish.
on:
  push:
    branches: [nightly]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/nightly.yml"
  workflow_dispatch:

# Read-only by default — only the publish job below is granted contents: write.
permissions:
  contents: read

# One in-flight nightly build; a newer push supersedes an older one. Run numbers
# still increase strictly, so build ordering is never disturbed.
concurrency:
  group: nightly
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test before nightly
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run tests
        run: swift test
      - name: Run engine unit tests
        run: python3 -m unittest discover -s Resources/engine/tests -t Resources/engine
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  nightly:
    name: Build and publish Nightly pre-release
    runs-on: macos-26
    needs: test
    # Only this job writes releases (least privilege; the test job stays read-only).
    # `models: read` lets highlights.sh call GitHub Models for the friendly notes.
    permissions:
      contents: write
      models: read
    # Only the canonical repo publishes — a fork building its own `nightly`
    # branch must not push to (or fail against) these releases.
    if: github.repository == 'rafay99-epic/Crisp'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version is the commit count
          persist-credentials: false # we publish via gh, never git push

      - name: Compute identity
        run: |
          echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          # Monotonic CI run number — the updater orders Nightly builds by this.
          echo "BUILD=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build Nightly app and installer
        run: |
          export CRISP_CHANNEL=nightly
          export CRISP_VERSION="$VERSION"
          export CRISP_BUILD="$BUILD"
          ./make-dmg.sh

      - name: Refresh the rolling "nightly" pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A single fixed `nightly` tag that always holds the newest Nightly DMG —
          # GitHub has no /latest/ URL for pre-releases, so the updater and the
          # Homebrew cask (rafay99-epic/apps/crisp-nightly) need this stable pointer.
          # The title MUST contain "build <n>" — the updater (Updater.buildNumber)
          # and the website's convex lib parse it to order builds.
          #
          # Notes: list the PRs merged since the previous nightly build. The rolling
          # release stores the build's commit in target_commitish, so read it BEFORE
          # deleting the release, then diff that SHA to HEAD with the shared changelog
          # generator. First build (no prior release) → just the install boilerplate.
          PREV=$(gh release view nightly --json targetCommitish -q .targetCommitish 2>/dev/null || true)
          NOTES_FILE="$(mktemp)"
          {
            if [ -n "$PREV" ] && git rev-parse --verify --quiet "${PREV}^{commit}" >/dev/null; then
              # Friendly, user-facing highlights via GitHub Models (best-effort).
              HIGHLIGHTS="$(bash "$GITHUB_WORKSPACE/.github/scripts/highlights.sh" "${PREV}..HEAD" || true)"
              [ -n "$HIGHLIGHTS" ] && echo "$HIGHLIGHTS"
              # Full grouped changelog underneath.
              CHANGES="$(bash "$GITHUB_WORKSPACE/.github/scripts/gen-changelog.sh" "${PREV}..HEAD" || true)"
              if [ -n "$CHANGES" ]; then
                echo "## What's changed since the last nightly"
                echo
                echo "$CHANGES"
                echo
              fi
            fi
            echo "Nightly build from the \`nightly\` branch @ \`$SHA\` (build $BUILD, version $VERSION-nightly)."
            echo
            echo "**Install:** \`brew install --cask rafay99-epic/apps/crisp-nightly\`, or download \`Crisp-Nightly.dmg\` below and drag to Applications."
            echo
            echo "Installs as **Crisp Nightly** — separate app, settings, and icon — so it sits next to a Stable install without touching it. Nightly auto-updates from this feed."
            echo
            echo "⚠️ Unsigned pre-release build for testing. Right-click → Open the first time to get past Gatekeeper."
          } > "$NOTES_FILE"
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly build/Crisp-Nightly.dmg \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Crisp Nightly · build $BUILD" \
            --notes-file "$NOTES_FILE"
