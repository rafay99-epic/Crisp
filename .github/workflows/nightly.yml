name: Nightly

# The Nightly channel's feed. Every push to the `nightly` integration branch
# builds the Nightly app and refreshes a single rolling `nightly` GitHub
# *pre-release* carrying Crisp-Nightly.dmg — the feed the Nightly app's updater
# and the Homebrew cask (rafay99-epic/apps/crisp-nightly) track. Stable (main →
# ci.yml's release job) is untouched; Dev publishes nothing.
#
# Gated by tests: a broken push publishes nothing. Publishing is guarded to the
# canonical repo so a fork's `nightly` branch can't try (and fail) to publish.
on:
  push:
    branches: [nightly]
    paths:
      - "apps/desktop/**"
      # A Windows-only change still rebuilds the DMG so the one shared `nightly`
      # release carries both assets built from the same commit (see windows.yml).
      - "apps/desktop-win/**"
      - "packages/engine/**"
      - ".github/workflows/nightly.yml"
      # Docs-only changes never need a build — skip .md-only diffs (last-match-wins).
      - "!**/*.md"
  workflow_dispatch:

# Read-only by default — only the publish job below is granted contents: write.
permissions:
  contents: read

# One in-flight nightly build; a newer push supersedes an older one. Run numbers
# still increase strictly, so build ordering is never disturbed.
concurrency:
  group: nightly
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/desktop

jobs:
  test:
    name: Test before nightly
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run tests
        run: swift test
      - name: Run engine unit tests
        working-directory: packages/engine
        run: python3 -m unittest discover -s tests -t .
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --reporter github-actions-logging

  nightly:
    name: Build and publish Nightly pre-release
    runs-on: macos-26
    needs: test
    # Only this job writes releases (least privilege; the test job stays read-only).
    # `models: read` lets highlights.sh call GitHub Models for the friendly notes.
    permissions:
      contents: write
      models: read
    # Only the canonical repo publishes — a fork building its own `nightly`
    # branch must not push to (or fail against) these releases.
    if: github.repository == 'rafay99-epic/Crisp'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the version is the commit count
          persist-credentials: false # we publish via gh, never git push

      - name: Compute identity
        run: |
          echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          # Commit count on nightly — a monotonic build number the macOS DMG and the
          # Windows exe compute identically from this same commit, so the single shared
          # release's "build N" title orders both platforms coherently (windows.yml
          # bakes the same value). Both updaters parse `build (\d+)` from the title.
          echo "BUILD=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Build Nightly app and installer
        run: |
          export CRISP_CHANNEL=nightly
          export CRISP_VERSION="$VERSION"
          export CRISP_BUILD="$BUILD"
          ./make-dmg.sh

      - name: Refresh the rolling "nightly" pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A single fixed `nightly` tag that always holds the newest Nightly DMG —
          # GitHub has no /latest/ URL for pre-releases, so the updater and the
          # Homebrew cask (rafay99-epic/apps/crisp-nightly) need this stable pointer.
          # The title MUST contain "build <n>" — the updater (Updater.buildNumber)
          # and the website's convex lib parse it to order builds.
          #
          # Notes: list the PRs merged since the previous nightly build. PREV = the
          # commit the rolling `nightly` tag currently points at (the last published
          # build); diff PREV..HEAD with the shared changelog generator. Read it from
          # the tag itself — we no longer delete+recreate the release (that would drop
          # the Windows exe windows.yml uploads here), so target_commitish can't be the
          # source. First build (no prior tag) → just the install boilerplate.
          git fetch origin 'refs/tags/nightly:refs/tags/nightly' --force 2>/dev/null || true
          PREV=$(git rev-parse -q --verify 'refs/tags/nightly^{commit}' 2>/dev/null || true)
          NOTES_FILE="$(mktemp)"
          {
            if [ -n "$PREV" ] && git rev-parse --verify --quiet "${PREV}^{commit}" >/dev/null; then
              # Friendly, user-facing highlights via GitHub Models (best-effort).
              HIGHLIGHTS="$(bash "$GITHUB_WORKSPACE/.github/scripts/highlights.sh" "${PREV}..HEAD" || true)"
              [ -n "$HIGHLIGHTS" ] && echo "$HIGHLIGHTS"
              # Full grouped changelog underneath.
              CHANGES="$(bash "$GITHUB_WORKSPACE/.github/scripts/gen-changelog.sh" "${PREV}..HEAD" || true)"
              if [ -n "$CHANGES" ]; then
                echo "## What's changed since the last nightly"
                echo
                echo "$CHANGES"
                echo
              fi
            fi
            echo "Nightly build from the \`nightly\` branch @ \`$SHA\` (build $BUILD, version $VERSION-nightly)."
            echo
            echo "**Install:** \`brew install --cask rafay99-epic/apps/crisp-nightly\`, or download \`Crisp-Nightly.dmg\` below and drag to Applications."
            echo
            echo "Installs as **Crisp Nightly** — separate app, settings, and icon — so it sits next to a Stable install without touching it. Nightly auto-updates from this feed."
            echo
            echo "⚠️ Unsigned pre-release build for testing. Right-click → Open the first time to get past Gatekeeper."
          } > "$NOTES_FILE"
          # Upsert, never delete: refresh the title/notes and the DMG in place so the
          # Windows exe on this release survives. windows.yml uploads Crisp-Nightly-Setup.exe
          # to the same release; the two assets never collide (different names).
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --prerelease \
              --title "Crisp Nightly · build $BUILD" --notes-file "$NOTES_FILE"
            gh release upload nightly build/Crisp-Nightly.dmg --clobber
          else
            gh release create nightly build/Crisp-Nightly.dmg --prerelease \
              --target "$GITHUB_SHA" --title "Crisp Nightly · build $BUILD" --notes-file "$NOTES_FILE"
          fi
          # Advance the rolling tag to this commit so the next build's changelog (PREV
          # above) starts here — the release is never deleted, so the tag won't move on
          # its own.
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/nightly" \
            -f sha="$GITHUB_SHA" -F force=true >/dev/null 2>&1 || true

      # Sync the version-pinned `crisp-nightly` cask to the DMG just shipped. The
      # nightly tag is rolling, so the cask version is the monotonic build number
      # (matches the "build <n>" release title). Needs the TAP_TOKEN secret;
      # skips with a warning if absent so a missing secret never fails the build.
      - name: Bump Homebrew cask (nightly)
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping nightly cask bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          VERSION="$BUILD" CASK=crisp-nightly \
            bash "$GITHUB_WORKSPACE/.github/scripts/bump-cask.sh" "$PWD/build/Crisp-Nightly.dmg"
